authentication: null
sniffer:
  enable: true
  force-dns-mapping: true
  parse-pure-ip: true
  override-destination: false
  sniff:
    HTTP:
      ports:
      - 80
      - 8080
      - 8880
      - 8008
    TLS:
      ports:
      - 443
      - 8443
      - 4433
    QUIC:
      ports:
      - 443
      - 8443
  skip-domain:
