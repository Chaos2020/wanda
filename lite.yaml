- DOMAIN-SUFFIX,subconverters.com,PG-Sage
- RULE-SET,anting,DIRECT
- RULE-SET,private,DIRECT
- RULE-SET,reject,REJECT
- RULE-SET,direct,DIRECT
- RULE-SET,cncidr,DIRECT
- RULE-SET,lancidr,DIRECT
- RULE-SET,tld-not-cn,PG-default
- RULE-SET,gfw,PG-default
- RULE-SET,greatfire,PG-default
- RULE-SET,telegramcidr,PG-default
- RULE-SET,google,PG-Google
- RULE-SET,proxy,PG-default
- RULE-SET,apple,DIRECT
- RULE-SET,icloud,PG-default
- MATCH,PG-default
authentication: null
sniffer:
  enable: true
  force-dns-mapping: true
  parse-pure-ip: true
  override-destination: false
  sniff:
    HTTP:
      ports:
      - 80
      - 8080
      - 8880
      - 8008
    TLS:
      ports:
      - 443
      - 8443
      - 4433
    QUIC:
      ports:
      - 443
      - 8443
  skip-domain:
  - Mijia Cloud
  - dlg.io.mi.com
  - push.apple.com
  - +.push.apple.com
tun:
  enable: false
  stack: system
  auto-route: true
  auto-redir: true
  auto-redirect: true
  auto-detect-interface: true
  dns-hijack:
  - any:53
  - tcp://any:53
  strict-route: true
  route-exclude-address:
  - 1.1.1.1/32
  exclude-interface:
  - docker0
  - podman0
