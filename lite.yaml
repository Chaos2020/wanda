  ipv6: true
  listen: 0.0.0.0:1053
  fake-ip-range: 198.18.0.1/16
  enhanced-mode: fake-ip
  default-nameserver:
  - 114.114.114.114
  - 223.5.5.5
  - 119.29.29.29
  nameserver-policy:
    geosite:cn,private:
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query
  nameserver:
  - https://doh.pub/dns-query
  - https://dns.alidns.com/dns-query
  fallback:
  - https://dns.cloudflare.com/dns-query
  - https://dns.google/dns-query
  fallback-filter:
    geoip: true
    geoip-code: CN
    ipcidr:
    - 240.0.0.0/4
    - 0.0.0.0/8
    - 198.18.0.0/15
  fake-ip-filter:
  - '*.lan'
  - '*.local'
  - '*.localhost'
  - +.stun.*.*
  - +.stun.*.*.*
  - +.msftncsi.com
  - '*.msftncsi.com'
  - '*.msftconnecttest.com'
  - dns.msftncsi.com
  - localhost.ptlogin2.qq.com
