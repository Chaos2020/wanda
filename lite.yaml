  - dlg.io.mi.com
  - push.apple.com
  - +.push.apple.com
tun:
  enable: false
  stack: system
  auto-route: true
  auto-redir: true
  auto-redirect: true
  auto-detect-interface: true
  dns-hijack:
  - any:53
  - tcp://any:53
  strict-route: true
  route-exclude-address:
  - 1.1.1.1/32
  exclude-interface:
  - docker0
  - podman0
