    geosite:cn,private:
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query
  nameserver:
  - https://doh.pub/dns-query
  - https://dns.alidns.com/dns-query
  fallback:
  - https://dns.cloudflare.com/dns-query
  - https://dns.google/dns-query
  fallback-filter:
    geoip: true
    geoip-code: CN
    ipcidr:
    - 240.0.0.0/4
    - 0.0.0.0/8
    - 198.18.0.0/15
  proxy-server-nameserver:
  - https://dns.cloudflare.com/dns-query
  - https://dns.google/dns-query
  fake-ip-filter:
  - '*.lan'
  - '*.local'
  - '*.localhost'
