mixed-port: 7898
allow-lan: true
bind-address: 0.0.0.0
mode: rule
log-level: info
unified-delay: true
tcp-concurrent: true
keep-alive-interval: 30
keep-alive-idle: 600
find-process-mode: strict
dial-timeout: 12000
global-client-fingerprint: chrome
geo-auto-update: true
geo-update-interval: 24
geodata-url: https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/Country.mmdb
geosite-url: https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/GeoSite.dat
profile:
  store-selected: true
  store-fake-ip: true
external-controller: 0.0.0.0:9090
secret: 82lxy6
external-ui: /home/ollama/clashctl/resources/ui/metecubexd/
external-ui-name: metacubexd
external-ui-url: https://github.com/MetaCubeX/metacubexd/archive/refs/heads/gh-pages.zip
tls:
  min-version: TLSv1.2
  max-version: TLSv1.3
  cipher-suites:
  - TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256
  - TLS_ECDHE_ECDSA_WITH_AES_256_GCM_SHA384
ech-opts:
  enable: false
  config: ''
ipv6: true
dns:
  enable: true
  ipv6: true
  listen: 0.0.0.0:1053
  fake-ip-range: 198.18.0.1/16
  enhanced-mode: fake-ip
  default-nameserver:
  - 114.114.114.114
  - 223.5.5.5
  - 119.29.29.29
  nameserver-policy:
    geosite:cn,private:
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query
  nameserver:
  - https://doh.pub/dns-query
  - https://dns.alidns.com/dns-query
  fallback:
  - https://dns.cloudflare.com/dns-query
  - https://dns.google/dns-query
  fallback-filter:
    geoip: true
    geoip-code: CN
    ipcidr:
    - 240.0.0.0/4
    - 0.0.0.0/8
    - 198.18.0.0/15
  fake-ip-filter:
  - '*.lan'
  - '*.local'
  - '*.localhost'
  - +.stun.*.*
  - +.stun.*.*.*
  - +.msftncsi.com
  - '*.msftncsi.com'
  - '*.msftconnecttest.com'
  - dns.msftncsi.com
  - localhost.ptlogin2.qq.com
